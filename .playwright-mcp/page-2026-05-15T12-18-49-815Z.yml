            - heading "Formation HACCP et allergies alimentaires" [level=3] [ref=e142]
            - paragraph [ref=e143]: Je propose d'animer des formations au sein de votre cuisine collective ou encore au sein de votre restaurant privé. L'idée et de vous assurer le respect des normes d'hygiène dans vos établissements et la formation de vos agents pour les cuisines collectives.
