        - paragraph [ref=e187]: Apprenez, partagez, grandissez ensemble
      - paragraph [ref=e189]: Je propose des ateliers en petit groupe pour explorer ensemble des thématiques autour de l'alimentation, du bien-être et de l'énergétique. Un moment convivial d'apprentissage et de partage dans un cadre bienveillant.
      - generic [ref=e190]:
        - generic [ref=e191]:
          - img [ref=e193]
          - heading "Concevoir ses menus" [level=3] [ref=e195]
          - paragraph [ref=e196]: Un moment pour créer un menu qui vous ressemble, à la fois équilibré et de saison. On réalise ensuite une liste de courses fonctionnelle associée pour éviter de se prendre la tête. Plus qu'à faire les courses en toute sérénité !
        - generic [ref=e197]:
          - img [ref=e199]
          - heading "Manifestation — Le pouvoir de créer votre vie de rêve" [level=3] [ref=e202]
          - paragraph [ref=e203]: Et si je vous disais que vous pouvez créer votre vie de rêve ? Un atelier doux et ludique où l'on se prépare à créer notre vie telle qu'on la voudrait. Munissez-vous d'un calepin et d'un stylo et embarquez dans cette aventure où vous redevenez le héros ou l'héroïne.
        - generic [ref=e204]:
          - img [ref=e206]
          - heading "Méditation et mini guidances" [level=3] [ref=e211]
          - paragraph [ref=e212]: Venez prendre un moment pour ralentir et écouter ce qui se passe à l'intérieur de vous. Nous explorerons différentes manières de méditer et procéderons ensuite à des tirages pour vous guider sur un sujet qui vous tient à cœur.
        - generic [ref=e213]:
          - img [ref=e215]
          - heading "Cuisine en famille" [level=3] [ref=e219]
          - paragraph [ref=e220]: Venez partager un moment entre parents et enfants ! Rien de tel que de faire découvrir un autre aspect de l'alimentation à votre enfant en lui faisant mettre la main à la pâte. Moments de complicité et gourmandises au programme.
        - generic [ref=e221]:
          - img [ref=e223]
          - heading "Cercles de femmes" [level=3] [ref=e225]
          - paragraph [ref=e226]: Un moment doux et sacré pour évoquer le sujet qui vous tient à cœur dans un groupe réduit et bienveillant. Et si c'était le moment de libérer ce qui vous pèse et vous freine ? Et si on reparlait sororité ?
        - generic [ref=e227]:
          - img [ref=e229]
          - heading "Diabète, cholestérol, triglycérides — les vraies recommandations" [level=3] [ref=e231]
          - paragraph [ref=e232]: Venez découvrir quelles sont les vraies recommandations afin de ne plus être perdus face aux conseils divers et variés. Un atelier éducatif mais qui restera ludique, pour apprendre à manger sans s'isoler.
        - generic [ref=e233]:
          - img [ref=e235]
          - heading "Diversification alimentaire de vos bébés" [level=3] [ref=e238]
          - paragraph [ref=e239]: "Un atelier entre mamans (et/ou papas) pour aborder les tous premiers repas de vos bébés. On y parlera de diversification classique mais aussi de la fameuse DME : diversification menée par l'enfant."
        - generic [ref=e240]:
          - img [ref=e242]
          - heading "L'alimentation des jeunes enfants" [level=3] [ref=e245]
          - paragraph [ref=e246]: Venez découvrir les besoins et dernières recommandations alimentaires et nutritionnelles de vos bouts de chou. On n'évoque pas seulement les recommandations mais aussi des conseils pour mieux s'en sortir au quotidien !
        - generic [ref=e247]:
