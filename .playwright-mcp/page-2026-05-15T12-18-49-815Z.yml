        - paragraph [ref=e49]: 10 ans à prendre soin de vous
      - generic [ref=e51]:
        - img "Laura Litaudon, diététicienne-énergéticienne" [ref=e53]
        - generic [ref=e54]:
          - paragraph [ref=e55]: Diététicienne depuis bientôt 10 ans, c'est forte de mon expérience que je mets aujourd'hui mes compétences à votre service.
          - paragraph [ref=e56]: La pluralité et la diversité de mes expériences me permettent aujourd'hui de prendre en charge les patients allant du bébé à la personne âgée.
          - paragraph [ref=e57]: Énergéticienne depuis avril 2025, je fais le choix de proposer des soins énergétiques et des guidances afin de vous aider à retrouver un équilibre intérieur et de l'apaisement.
          - paragraph [ref=e58]: L'énergétique me permet aujourd'hui d'approfondir la cause de certains symptômes que vous m'indiquerez en consultations diététiques. La partie énergétique permet de mettre en lumière des éléments que nous ne voyons parfois pas au premier abord.
          - paragraph [ref=e59]: Il est demandé ici de revenir à soi et laisser place à davantage de silence pour entendre les messages que notre corps cherche à nous faire passer de diverses manières.
          - paragraph [ref=e60]: L'idée est également de pouvoir déconstruire les croyances limitantes qui peuvent nous impacter et nous freiner. En diététique et en énergétique, nous pourrons travailler conjointement pour démêler le vrai du faux et vous permettre de retrouver assurance et autonomie.
          - button "Découvrir mes prestations" [ref=e62] [cursor=pointer]
