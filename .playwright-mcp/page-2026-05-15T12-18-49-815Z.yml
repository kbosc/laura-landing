            - heading "Formation besoins nutritionnels et équilibre alimentaire" [level=3] [ref=e135]
            - paragraph [ref=e136]: Je propose d'animer des formations sur l'équilibre alimentaire pour vos équipes soignantes que ce soit à l'hôpital pour les aides soigants ou infirmiers, ou encore sur les besoins du jeune enfant pour le personnel de crèche.
          - generic [ref=e137]:
