            - heading "Alimentation avec une maladie métabolique" [level=3] [ref=e119]
            - paragraph [ref=e120]: Réévaluer votre alimentation afin de mettre toutes les clés entre vos mains pour maintenir un bon état de santé et éviter l'apparition de complications.
          - generic [ref=e121]:
            - img [ref=e123]
            - heading "Animation pour les établissements extérieurs" [level=3] [ref=e128]
            - paragraph [ref=e129]: J'anime également des ateliers pour les écoles, les EHPAD, les mairies sur divers sujets liés à l'alimentation. Me contacter pour obtenir un devis personnalisé.
          - generic [ref=e130]:
