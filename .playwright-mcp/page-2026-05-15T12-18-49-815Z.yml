      - generic [ref=e76]:
        - paragraph [ref=e77]: Mon objectif est que vous ressortiez de nos consultations avec une relation saine avec votre alimentation afin que vous puissiez faire des choix conscients et autonomes sur ce que vous allez manger au quotidien. L'alimentation doit rester une source d'apports énergétiques et de plaisir. L'idée c'est de prendre soin de sa santé tout en restant dans une alimentation adaptée à votre rythme de vie et à vos particularités qui vous sont propres.
        - generic [ref=e78]:
