            - paragraph [ref=e92]: Ajustement de votre alimentation pour vous permettre de répondre aux besoins liés à la grossesse ou à l'allaitement pour le bien-être de maman et bébé.
          - generic [ref=e93]:
            - img [ref=e95]
            - heading "Troubles du comportement alimentaire" [level=3] [ref=e97]
            - paragraph [ref=e98]: Un accompagnement à votre rythme pour vous aider à mieux vivre au quotidien et à défaire méticuleusement un par un les blocages liés aux troubles du comportement alimentaire.
          - generic [ref=e99]:
            - img [ref=e101]
            - heading "Alimentation de l'enfant de 0 à 18 ans" [level=3] [ref=e104]
            - paragraph [ref=e105]: Prise en charge de vos enfants pour des demandes concernant la diversification de vos bébés, les troubles de l'oralité, l'éducation nutritionnelle ou encore la gestion du poids et de l'image corporelle.
          - generic [ref=e106]:
