          - heading "Hyperphagie, boulimie, émotions" [level=3] [ref=e254]
          - paragraph [ref=e255]: Quand notre monde intérieur impact notre alimentation. Venez approfondir vos connaissance et mettre des mots sur vos maux afin de pouvoir enfin faire la paix avec votre alimentation
